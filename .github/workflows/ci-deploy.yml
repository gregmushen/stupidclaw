name: CI and Deploy

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to Garageband Server
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.GARAGEBAND_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Install cloudflared
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$HOME/.local/bin/cloudflared"
          chmod +x "$HOME/.local/bin/cloudflared"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Deploy via Cloudflare Access
        env:
          SSH_HOST: ${{ secrets.GARAGEBAND_HOST }}
          SSH_USER: ${{ secrets.GARAGEBAND_USER }}
          DEPLOY_PATH: ${{ secrets.GARAGEBAND_DEPLOY_PATH }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          EXPECTED_CF_ID_SHA="4e4bde08caf0c524dfc0f70ce61bcaff732d1cbd78654e741228b5f29a725fef"
          EXPECTED_CF_SECRET_SHA="1a49783dbcd5df550d7e6f7787f1f9188109f263cf6392c40e2a6f52900c8b22"
          ACTUAL_CF_ID_SHA="$(printf '%s' "${CF_ACCESS_CLIENT_ID}" | sha256sum | awk '{print $1}')"
          ACTUAL_CF_SECRET_SHA="$(printf '%s' "${CF_ACCESS_CLIENT_SECRET}" | sha256sum | awk '{print $1}')"

          if [ "${ACTUAL_CF_ID_SHA}" != "${EXPECTED_CF_ID_SHA}" ] || [ "${ACTUAL_CF_SECRET_SHA}" != "${EXPECTED_CF_SECRET_SHA}" ]; then
            echo "Cloudflare secret hash mismatch in GitHub Actions."
            exit 1
          fi

          TUNNEL_PORT=2222
          cloudflared access tcp \
            --hostname "${SSH_HOST}" \
            --url "localhost:${TUNNEL_PORT}" \
            --service-token-id "${CF_ACCESS_CLIENT_ID}" \
            --service-token-secret "${CF_ACCESS_CLIENT_SECRET}" \
            >/tmp/cloudflared.log 2>&1 &
          CF_PID=$!
          trap 'kill ${CF_PID} >/dev/null 2>&1 || true' EXIT

          for i in $(seq 1 20); do
            if bash -c ">/dev/tcp/127.0.0.1/${TUNNEL_PORT}" >/dev/null 2>&1; then
              READY=1
              break
            fi
            sleep 1
          done

          if [ "${READY:-0}" -ne 1 ]; then
            echo "cloudflared tunnel did not become ready"
            cat /tmp/cloudflared.log || true
            exit 1
          fi

          REMOTE_CMD="set -euo pipefail; \
            if [ ! -d '${DEPLOY_PATH}/.git' ]; then \
              mkdir -p '${DEPLOY_PATH}'; \
              git clone '${REPO_URL}' '${DEPLOY_PATH}'; \
            fi; \
            cd '${DEPLOY_PATH}'; \
            git fetch origin main; \
            git checkout main; \
            git reset --hard origin/main; \
            if command -v docker-compose >/dev/null 2>&1; then \
              docker-compose up -d --build; \
            else \
              docker compose up -d --build; \
            fi"

          for attempt in 1 2 3 4 5; do
            if ssh -p "${TUNNEL_PORT}" -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new "${SSH_USER}@127.0.0.1" "${REMOTE_CMD}"; then
              exit 0
            fi
            echo "Deploy SSH attempt ${attempt} failed."
            cat /tmp/cloudflared.log || true
            sleep 3
          done

          echo "Deploy failed after 5 SSH attempts."
          exit 1
