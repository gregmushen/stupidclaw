name: CI and Deploy

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to Garageband Server
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.GARAGEBAND_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Install cloudflared
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$HOME/.local/bin/cloudflared"
          chmod +x "$HOME/.local/bin/cloudflared"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Deploy via Cloudflare Access
        env:
          SSH_HOST: ${{ secrets.GARAGEBAND_HOST }}
          SSH_USER: ${{ secrets.GARAGEBAND_USER }}
          DEPLOY_PATH: ${{ secrets.GARAGEBAND_DEPLOY_PATH }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          ssh -o ProxyCommand="cloudflared access ssh --hostname %h" -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new "${SSH_USER}@${SSH_HOST}" "set -euo pipefail; \
            if [ ! -d '${DEPLOY_PATH}/.git' ]; then \
              mkdir -p '${DEPLOY_PATH}'; \
              git clone '${REPO_URL}' '${DEPLOY_PATH}'; \
            fi; \
            cd '${DEPLOY_PATH}'; \
            git fetch origin main; \
            git checkout main; \
            git reset --hard origin/main; \
            if command -v docker-compose >/dev/null 2>&1; then \
              docker-compose up -d --build; \
            else \
              docker compose up -d --build; \
            fi"
