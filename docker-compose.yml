version: "3.8"

services:
  stupidclaw:
    build: .
    container_name: stupidclaw
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./profile.md:/app/profile.md:ro
      - stupidclaw-data:/var/data/stupidclaw
      - stupidclaw-logs:/var/log/stupidclaw
    depends_on:
      - telegram-bot

  telegram-bot:
    build: ./tgbot
    container_name: stupidclaw-telegram
    restart: unless-stopped
    env_file: .env
    ports:
      - "${TELEGRAM_NOTIFY_HOST_PORT:-8080}:8080"

volumes:
  stupidclaw-data:
  stupidclaw-logs:
